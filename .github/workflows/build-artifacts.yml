name: Build Artifacts

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Устанавливаем bash как оболочку по умолчанию для всех шагов
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: smcli_1.0.0_macos_arm64
            archive_name: smcli_1.0.0_macos_arm64.tar.gz
            asset_name: smcli
            installer_path: dist/installers/smcliMac/install.sh
          - os: ubuntu-latest
            artifact_name: smcli_1.0.0_linux_x64
            archive_name: smcli_1.0.0_linux_x64.tar.gz
            asset_name: smcli
            installer_path: dist/installers/smcliLinux/install.sh
          - os: windows-latest
            artifact_name: smcli_1.0.0_windows_x64
            archive_name: smcli_1.0.0_windows_x64.zip
            asset_name: smcli.exe
            installer_path: dist/installers/smcliWin/setup.iss

    steps:
    - uses: actions/checkout@v4

    - name: Build (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p bin
        make all
        mkdir -p release_unix
        cp bin/${{ matrix.asset_name }} release_unix/
        cp ${{ matrix.installer_path }} release_unix/
        cp completions/smcli-completion.sh release_unix/
        cp README.md release_unix/
        cp .smcliignore release_unix/
        tar -czf ${{ matrix.archive_name }} -C release_unix .
        mkdir -p upload_dir
        cp ${{ matrix.archive_name }} upload_dir/

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir -p bin
        g++ -std=c++17 -I./include -O3 src/*.cpp -o bin/smcli.exe
        mkdir -p release_win/bin
        cp bin/smcli.exe release_win/bin/
        cp .smcliignore release_win/
        # Для ZIP на Windows используем 7z (доступен в bash на GitHub runners) или zip
        7z a ${{ matrix.archive_name }} ./release_win/*

    - name: Copy binary for installer
      if: matrix.os == 'windows-latest'
      run: |
        mkdir -p dist/installers/smcliWin
        cp bin/smcli.exe dist/installers/smcliWin/smcli.exe

    - name: Create Inno Setup Installer
      if: matrix.os == 'windows-latest'
      # Этот экшен сам запускает Inno Setup, оболочка bash ему не мешает
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: dist/installers/smcliWin/setup.iss

    - name: Prepare Final Artifact Folder (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir -p upload_dir
        cp ${{ matrix.archive_name }} upload_dir/
        cp dist/installers/smcliWin/smcli-setup.exe upload_dir/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: upload_dir/
